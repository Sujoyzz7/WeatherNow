<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="WeatherNow - Modern Weather Dashboard with current conditions, 5-day forecast, and more">
    <meta name="theme-color" content="#2196F3">

    <title>WeatherNow - Modern Weather Dashboard</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Stylesheet -->
    <link rel="stylesheet" href="css/style.css">

    <!-- Favicon (inline SVG) -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🌤️%3C/text%3E%3C/svg%3E">
</head>
<body>

    <!-- Skip to main content (keyboard navigation) -->
    <a href="#main-content" class="skip-link">Skip to main content</a>

    <!-- ARIA live region for screen reader announcements (visually hidden) -->
    <div id="announcements" class="sr-only" aria-live="polite" aria-atomic="true"></div>

    <!-- ==================== HEADER ==================== -->
    <header class="header" role="banner">
        <div class="container header__inner">
            <a href="#" class="header__brand" aria-label="WeatherNow Home">
                <span class="header__logo" aria-hidden="true">🌤️</span>
                <span class="header__title">WeatherNow</span>
            </a>

            <nav class="header__controls" aria-label="Application controls">
                <button
                    id="location-btn"
                    class="btn btn--icon btn--location"
                    aria-label="Get weather for current location"
                    title="Current Location"
                >
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
                        <circle cx="12" cy="10" r="3"/>
                    </svg>
                </button>

                <button
                    id="theme-toggle"
                    class="btn btn--icon btn--theme"
                    aria-label="Toggle dark mode"
                    title="Toggle Theme"
                >
                    <span class="theme-icon" aria-hidden="true">🌙</span>
                </button>
            </nav>
        </div>
    </header>

    <!-- ==================== MAIN CONTENT ==================== -->
    <main class="main" id="main-content" role="main" tabindex="-1">
        <div class="container">

            <!-- Search Section -->
            <section class="search-section" aria-label="Search weather">
                <form id="search-form" class="search-form" role="search">
                    <div class="search-form__wrapper">
                        <svg class="search-form__icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <circle cx="11" cy="11" r="8"/>
                            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                        </svg>
                        <input
                            type="text"
                            id="search-input"
                            class="search-form__input"
                            placeholder="Search city..."
                            aria-label="Enter city name"
                            autocomplete="off"
                            autocapitalize="on"
                            spellcheck="false"
                        >
                        <button
                            type="submit"
                            id="search-btn"
                            class="btn btn--primary search-form__btn"
                            aria-label="Search weather"
                        >
                            Search
                        </button>
                    </div>
                </form>

                <div id="error-message" class="error-message" role="alert" aria-live="polite" hidden></div>
            </section>

            <!-- Recent Searches -->
            <section id="recent-searches" class="recent-searches" aria-label="Recent searches" hidden>
                <h2 class="section-title">Recent Searches</h2>
                <div id="recent-list" class="recent-list" role="list"></div>
            </section>

            <!-- Loading State -->
            <div id="loading" class="loading" role="status" aria-live="polite" hidden>
                <div class="loading__spinner" aria-hidden="true">
                    <div class="loading__dot"></div>
                    <div class="loading__dot"></div>
                    <div class="loading__dot"></div>
                </div>
                <span class="loading__text">Loading weather data...</span>
            </div>

            <!-- Weather Display (hidden until search) -->
            <div id="weather-display" class="weather-display" tabindex="-1" hidden>

                <!-- Current Weather -->
                <section id="current-weather" class="current-weather" aria-label="Current weather">
                    <!-- Populated by ui.js -->
                </section>

                <!-- Hourly Forecast -->
                <section id="hourly-forecast" class="hourly-forecast" aria-label="Hourly forecast">
                    <!-- Populated by ui.js -->
                </section>

                <!-- Air Quality -->
                <section id="air-quality" class="air-quality" aria-label="Air quality index">
                    <!-- Populated by ui.js -->
                </section>

                <!-- 5-Day Forecast -->
                <section id="forecast" class="forecast" aria-label="5-day weather forecast">
                    <!-- Populated by ui.js -->
                </section>

            </div>

            <!-- Empty State -->
            <div id="empty-state" class="empty-state">
                <div class="empty-state__icon" aria-hidden="true">🌤️</div>
                <h2 class="empty-state__title">Welcome to WeatherNow</h2>
                <p class="empty-state__text">Search for a city to get started</p>
            </div>

        </div>
    </main>

    <!-- ==================== FOOTER ==================== -->
    <footer class="footer" role="contentinfo">
        <div class="container footer__inner">
            <p class="footer__text">
                <span class="footer__version">v<span id="app-version">--</span></span>
                WeatherNow &copy; <span id="footer-year">2026</span>
                &middot; Powered by
                <a href="https://openweathermap.org/" target="_blank" rel="noopener noreferrer" class="footer__link">OpenWeatherMap</a>
            </p>
        </div>
    </footer>

    <!-- ==================== SCRIPTS ==================== -->
    <script src="js/storage.js"></script>
    <script src="js/api.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>

</body>
</html>
